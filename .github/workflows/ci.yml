name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Guards the "no overflow on mobile or desktop" requirement. Needs a real
      # browser and a running server, so it comes after the build.
      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check horizontal overflow
        run: |
          npx next start -p 3000 &
          for i in $(seq 1 60); do
            curl -sf -o /dev/null http://localhost:3000 && break
            sleep 1
          done
          npm run check:overflow
